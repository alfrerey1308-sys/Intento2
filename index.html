<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Completo</title>
    <style>
        /* Estilos Nuevos */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 40px;
        }

        .demo-form-card {
            background: #fdfdfd;
            padding: 35px;
            border-radius: 20px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h3 {
            text-align: center;
            color: #667eea;
            font-size: 24px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            text-align: center;
            color: #777;
            font-size: 15px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 18px;
            color: #444;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fafafa;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            background-color: #fff;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        button {
            margin-top: 28px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 17px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .resultado {
            margin-top: 25px;
            padding: 20px;
            background-color: #f4f0fc;
            border-radius: 10px;
            color: #444;
            border: 2px dashed #cbbde2;
        }
    </style>
</head>
<body>

<section class="demo-form-card">
  <h3>Formulario de Datos</h3>
  <p>Ingresa toda la información solicitada</p>

  <form>
    <label for="nombre">Nombre completo:</label>
    <input type="text" id="nombre" placeholder="Escribe tu nombre completo">

    <label for="edad">Edad:</label>
    <input type="number" id="edad" placeholder="Escribe tu edad">

    <label for="correo">Correo:</label>
    <input type="email" id="correo" placeholder="ejemplo@correo.com">

    <label for="grupo">Grupo:</label>
    <input type="text" id="grupo" placeholder="Ejemplo: 4° A">

    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" placeholder="Tu número de teléfono">

    <label for="fecha">Fecha:</label>
    <input type="date" id="fecha">

    <label for="ciudad">Ciudad:</label>
    <input type="text" id="ciudad" placeholder="Ciudad donde vives">

    <label for="materia">Materia favorita:</label>
    <input type="text" id="materia" placeholder="¿Cuál es tu favorita?">

    <label for="comentario">Comentario:</label>
    <textarea id="comentario" placeholder="Escribe aquí tus comentarios..."></textarea>

    <button type="button" onclick="mostrarDatos()">Mostrar datos</button>
  </form>

  <div id="resultado" class="resultado">
    Aquí aparecerá la información capturada.
  </div>
</section>

<script>
function mostrarDatos() {
    const nombre = document.getElementById('nombre').value;
    const edad = document.getElementById('edad').value;
    const correo = document.getElementById('correo').value;
    const grupo = document.getElementById('grupo').value;
    const telefono = document.getElementById('telefono').value;
    const fecha = document.getElementById('fecha').value;
    const ciudad = document.getElementById('ciudad').value;
    const materia = document.getElementById('materia').value;
    const comentario = document.getElementById('comentario').value;

    const resultado = document.getElementById('resultado');

    if (nombre && edad && correo && grupo && telefono && fecha && ciudad && materia) {
        resultado.innerHTML = `
            <strong>✅ Datos Registrados:</strong><br><br>
            <strong>Nombre:</strong> ${nombre}<br>
            <strong>Edad:</strong> ${edad} años<br>
            <strong>Correo:</strong> ${correo}<br>
            <strong>Grupo:</strong> ${grupo}<br>
            <strong>Teléfono:</strong> ${telefono}<br>
            <strong>Fecha:</strong> ${fecha}<br>
            <strong>Ciudad:</strong> ${ciudad}<br>
            <strong>Materia Favorita:</strong> ${materia}<br>
            <strong>Comentario:</strong> ${comentario}
        `;
        resultado.style.color = "#4a148c";
    } else {
        resultado.innerHTML = "⚠️ Por favor, llena todos los campos obligatorios.";
        resultado.style.color = "red";
    }
}
</script>

</body>
</html>
